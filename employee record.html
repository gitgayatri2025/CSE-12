<!DOCTYPE html>
<html>
<head>
    <title>Employee Management System</title>
    <link rel="stylesheet" href="employee record.css">
</head>

<body>

<h2>Employee Management System</h2>

<div class="form-container">

<label>Employee Name</label>
<input type="text" id="name">

<label>Employee ID</label>
<input type="text" id="id">

<label>Salary</label>
<input type="number" id="salary">

<label>Department</label>
<input type="text" id="department">

<button onclick="addEmployee()">Add Employee</button>

</div>


<div class="buttons">

<button onclick="displayEmployees()">Display All Employees</button>
<button onclick="filterSalary()">Salary > 50000</button>
<button onclick="totalSalary()">Total Salary</button>
<button onclick="averageSalary()">Average Salary</button>

<input type="text" id="deptSearch" placeholder="Enter Department">
<button onclick="countDepartment()">Count Department</button>

</div>


<div id="output"></div>

<script src="script.js"></script>

</body>
</html>
